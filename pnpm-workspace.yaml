packages:
  - apps/*
  - packages/*
  - tools/*

catalog:
  "@testing-library/dom": ^10.4.1
  "@testing-library/react": ^16.3.2
  "@types/node": ^24
  jsdom: ^29.0.0
  typescript: ^5
  vite: npm:@voidzero-dev/vite-plus-core@latest
  vite-plus: latest
  vitest: npm:@voidzero-dev/vite-plus-test@latest

catalogMode: prefer
overrides:
  vite: "catalog:"
  vitest: "catalog:"
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
