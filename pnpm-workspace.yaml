  "@types/mdast": 4.0.4
  "@types/node": ~24.12.0
  "@types/unist": 3.0.3
  "@vitejs/plugin-react": 6.0.1
  jsdom: 29.0.1
  katex: 0.16.40
  mermaid: 11.13.0
  rehype-katex: 7.0.1
  remark-directive: 4.0.0
  remark-frontmatter: 5.0.0
  remark-gfm: 4.0.1
  remark-math: 6.0.0
  typescript: 5.x
  unified: 11.0.5
  vite: npm:@voidzero-dev/vite-plus-core@0.1.13
